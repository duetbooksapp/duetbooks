<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duet Books — AAA Life Specialist Compensation Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--pri:#534AB7;--grn:#1D9E75;--amb:#EF9F27;--red:#D94545;--dgrn:#0F6E56;--bg:#f5f5f3;--card:#fff;--ptint:#EEEDFE;--gtint:#F0FBF7;--atint:#FFFCF5;--rtint:#FEF2F2;--txt:#222;--muted:#666;--border:#ddd;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08)}
html{font-size:13px;overflow-x:hidden}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);line-height:1.5;overflow-x:hidden}

/* ── Login Screen ── */
.login-screen{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px;background:linear-gradient(135deg,#534AB7 0%,#1D9E75 100%)}
.login-card{background:#fff;border-radius:16px;padding:40px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);box-sizing:border-box}
.login-card h1{color:var(--pri);font-size:28px;margin-bottom:4px;text-align:center}
.login-card .subtitle{color:var(--muted);font-size:13px;text-align:center;margin-bottom:30px}
.login-card label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;margin-top:16px;text-transform:uppercase;letter-spacing:.5px}
.login-card input,.login-card select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit}
.login-card input:focus,.login-card select:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(83,74,183,.15)}
.login-btn{width:100%;padding:12px;background:var(--pri);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;margin-top:24px;transition:background .2s}
.login-btn:hover{background:#4339A0}
.login-toggle{text-align:center;margin-top:16px;font-size:13px;color:var(--muted)}
.login-toggle a{color:var(--pri);cursor:pointer;text-decoration:underline}
.login-error{color:var(--red);font-size:12px;text-align:center;margin-top:12px;display:none}

/* ── Top Bar ── */
.topbar{background:var(--pri);color:#fff;padding:10px 24px;display:flex;justify-content:space-between;align-items:center}
.topbar .brand{font-weight:700;font-size:16px}
.topbar .agent-info{font-size:12px;opacity:.8}
.topbar .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);display:inline-block;margin-right:6px}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar .logout-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 12px;border-radius:4px;font-size:11px;cursor:pointer}
.topbar .logout-btn:hover{background:rgba(255,255,255,.25)}

/* ── Tabs ── */
.tabs{display:flex;gap:0;background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto}
.tab{padding:12px 20px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;color:var(--muted);transition:all .2s}
.tab:hover{color:var(--txt)}
.tab.active{color:var(--pri);border-bottom-color:var(--pri);font-weight:600}
.tab .tab-short{display:none}
.tab .tab-full{display:inline}

/* ── Panels ── */
.panel{display:none;padding:24px;max-width:1200px;margin:0 auto}
.panel.active{display:block}

/* ── Cards ── */
.card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.card h2{font-size:18px;margin-bottom:12px}
.card h3{font-size:15px;margin-bottom:8px;color:var(--pri)}

/* ── Stat Cards Grid ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);text-align:center;border-top:3px solid var(--pri)}
.stat-card.green{border-top-color:var(--grn)}
.stat-card.amber{border-top-color:var(--amb)}
.stat-card.red{border-top-color:var(--red)}
.stat-card .stat-value{font-size:28px;font-weight:700;margin:4px 0}
.stat-card .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;background:var(--card);font-size:12px}
th{background:var(--ptint);padding:10px 12px;text-align:left;font-weight:600;white-space:nowrap;cursor:pointer;user-select:none;font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--pri)}
th:hover{background:#DDDAFE}
td{padding:8px 12px;border-top:1px solid #f0f0f0;vertical-align:middle}
tr:hover td{background:#FAFAFA}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:10px;font-weight:600;color:#fff;letter-spacing:.3px}
.badge-pri{background:var(--pri)}
.badge-grn{background:var(--grn)}
.badge-amb{background:var(--amb)}
.badge-red{background:var(--red)}
.badge-carrier-aaa{background:#7B2D8E}
.badge-carrier-mm{background:#005DAA}
.badge-carrier-sec{background:#2E7D32}

/* ── Status Pipeline Dots ── */
.pipe-status{display:flex;gap:3px;align-items:center}
.pipe-step{width:16px;height:4px;border-radius:2px;background:#E0E0E0}
.pipe-step.done{background:var(--grn)}
.pipe-step.current{background:var(--pri)}

/* ── Buttons ── */
.btn{padding:6px 14px;border:none;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-pri{background:var(--pri);color:#fff}.btn-pri:hover{background:#4339A0}
.btn-grn{background:var(--grn);color:#fff}.btn-grn:hover{background:var(--dgrn)}
.btn-amb{background:var(--amb);color:#fff}.btn-amb:hover{background:#D48A1F}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#B83B3B}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--txt)}.btn-outline:hover{background:#f5f5f5}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-next{background:var(--grn);color:#fff;padding:3px 10px;font-size:11px;border-radius:4px;border:none;cursor:pointer}
.btn-next:hover{background:var(--dgrn)}
.btn-del{background:none;color:var(--red);border:none;font-size:11px;cursor:pointer;text-decoration:underline}

/* ── Forms ── */
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column}
.form-group label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--pri)}

/* ── New Case Form ── */
.add-case-form{background:var(--atint);border:1px solid #F0E0C0;border-radius:var(--radius);padding:20px;margin-bottom:20px}
.add-case-form h3{color:var(--amb);margin-bottom:12px}
.commission-preview{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px;margin-top:12px;font-size:12px}
.commission-preview .big{font-size:22px;font-weight:700;color:var(--grn)}

/* ── Filter Bar ── */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit}
.filter-bar .count{font-size:11px;color:var(--muted);margin-left:auto}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:12px;padding:24px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h2{font-size:18px;margin-bottom:16px;color:var(--pri)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* ── Tier Card ── */
.tier-card{display:flex;align-items:center;gap:20px;background:var(--ptint);border-radius:var(--radius);padding:16px 24px;margin-bottom:24px}
.tier-badge{font-size:36px;font-weight:800;color:var(--pri)}
.tier-badge.t4{color:var(--grn)}
.tier-badge.t3{color:var(--amb)}
.tier-badge.t2{color:var(--pri)}
.tier-badge.t1{color:var(--red)}
.tier-info .tier-label{font-size:12px;color:var(--muted)}
.tier-info .tier-value{font-size:18px;font-weight:600}
.tier-progress{flex:1}
.tier-bar{height:8px;background:#E0E0E0;border-radius:4px;overflow:hidden;margin-top:6px}
.tier-bar-fill{height:100%;border-radius:4px;transition:width .5s}

/* ── Monthly Table ── */
.monthly-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;margin-top:12px}
.month-cell{text-align:center;padding:8px 4px;border-radius:6px;font-size:11px}
.month-cell .month-label{font-size:9px;color:var(--muted);text-transform:uppercase}
.month-cell .month-value{font-weight:700;font-size:13px}

/* ── Image Upload ── */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px;position:relative}
.upload-zone:hover{border-color:var(--pri);background:var(--ptint)}
.upload-zone.dragover{border-color:var(--grn);background:var(--gtint)}
.upload-zone .upload-icon{font-size:28px;margin-bottom:4px}
.upload-zone .upload-text{font-size:12px;color:var(--muted)}
.upload-zone .upload-hint{font-size:10px;color:var(--muted);margin-top:4px}
.upload-preview{max-width:100%;max-height:150px;border-radius:6px;margin-top:8px;border:1px solid var(--border)}
.upload-processing{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:var(--ptint);border-radius:20px;font-size:12px;color:var(--pri);font-weight:600}
.upload-processing .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toast ── */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#333;color:#fff;padding:12px 20px;border-radius:var(--radius);font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.2);animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── Pay Period ── */
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.pay-panel{border-radius:var(--radius);padding:16px;border:1px solid var(--border)}
.pay-panel-v{background:var(--ptint);border-color:#C5C0F0}
.pay-panel-w{background:var(--gtint);border-color:#B8E6D4}
.pay-panel h4{margin-bottom:12px;font-size:14px}
.preview-box{background:var(--card);border:2px solid var(--pri);border-radius:var(--radius);padding:16px;margin:16px 0}
.preview-box h4{color:var(--pri);margin-bottom:8px}
.match-box{background:var(--gtint);border:1px solid #B8E6D4;border-radius:var(--radius);padding:16px}
.match-box h4{color:var(--grn);margin-bottom:8px}
.strong{color:var(--grn);font-weight:600}
.possible{color:var(--amb);font-weight:600}
.pay-history-card{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow);margin-bottom:8px;border-left:4px solid var(--pri)}
.pay-history-card .ph-label{font-weight:600;font-size:14px}
.pay-history-card .ph-meta{font-size:11px;color:var(--muted)}
.pay-history-card .ph-amount{font-size:18px;font-weight:700;color:var(--grn)}

/* ── Cash Flow ── */
.cf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.cf-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);text-align:center}
.cf-card .cf-period{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.cf-card .cf-amount{font-size:28px;font-weight:700;margin:6px 0}
.cf-card .cf-sub{font-size:11px;color:var(--muted)}
.cf-vs{display:flex;gap:24px;margin-bottom:24px}
.cf-vs-card{flex:1;background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border-top:3px solid var(--pri)}
.cf-vs-card h4{font-size:12px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.cf-vs-card .big{font-size:24px;font-weight:700}
.needs-card{background:var(--atint);border:1px solid #F0E0C0;border-radius:var(--radius);padding:20px;margin-bottom:24px}
.needs-card h3{color:var(--amb);margin-bottom:12px}
.needs-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0e0c0;font-size:13px}
.needs-row:last-child{border-bottom:none}

/* ── Version ── */
.version{text-align:center;font-size:10px;color:var(--muted);padding:20px;opacity:.5}

/* ── Responsive ── */

/* Mobile card view for tables */
.mobile-cards{display:none}
.mobile-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:10px;border-left:4px solid var(--pri)}
.mobile-card .mc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.mobile-card .mc-client{font-weight:700;font-size:14px}
.mobile-card .mc-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid #f5f5f5}
.mobile-card .mc-row:last-child{border-bottom:none}
.mobile-card .mc-label{color:var(--muted)}
.mobile-card .mc-value{font-weight:500}
.mobile-card .mc-actions{display:flex;gap:8px;margin-top:10px;padding-top:8px;border-top:1px solid #f0f0f0}
.mobile-card .mc-actions .btn{flex:1;text-align:center;padding:8px;font-size:12px}

@media(max-width:768px){
 /* Layout */
 .stat-grid{grid-template-columns:repeat(2,1fr);gap:10px}
 .panel{padding:14px}
 .topbar{padding:8px 14px}
 .form-row{grid-template-columns:1fr}
 .monthly-grid{grid-template-columns:repeat(6,1fr)}
 .pay-grid{grid-template-columns:1fr}
 .cf-grid{grid-template-columns:1fr}
 .cf-vs{flex-direction:column}

 /* Tabs — scrollable with short labels on mobile */
 .tabs{padding:0;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
 .tabs::-webkit-scrollbar{display:none}
 .tab{padding:10px 14px;font-size:12px;flex-shrink:0}
 .tab .tab-full{display:none}
 .tab .tab-short{display:inline}

 /* Tier card stack */
 .tier-card{flex-direction:column;text-align:center;padding:14px}
 .tier-progress{width:100%}
 .tier-badge{font-size:30px}
 .tier-info .tier-value{font-size:16px}

 /* Filter bar */
 .filter-bar{flex-direction:column;gap:6px}
 .filter-bar select,.filter-bar input{width:100%;padding:10px 12px;font-size:14px}
 .filter-bar .count{margin-left:0;text-align:center}

 /* Buttons — bigger touch targets */
 .btn{padding:10px 16px;font-size:13px}
 .btn-next{padding:8px 14px;font-size:12px}

 /* Login screen mobile */
 .login-screen{padding:12px}
 .login-card{padding:28px 20px;max-width:100%}
 .login-card h1{font-size:24px}

 /* Help & modals full width */
 .modal{max-width:95%;padding:20px 16px}
 .help-modal{max-width:100%;width:100%;max-height:95vh;border-radius:12px 12px 0 0}
 .help-topics{gap:4px}
 .help-topic{font-size:10px;padding:4px 10px}

 /* Onboarding */
 .onboarding-card{padding:24px 20px;max-width:95%}
 .ob-step{min-height:140px}

 /* Book of Business — show cards, hide table */
 .mobile-cards{display:block}
 .desktop-table{display:none}

 /* Pay periods */
 .pay-history-card{flex-direction:column;align-items:flex-start;gap:6px}
 .pay-history-card .ph-amount{font-size:16px}

 /* Cash flow cards */
 .cf-card .cf-amount{font-size:22px}
 .cf-card{padding:14px}

 /* Upload zone */
 .upload-zone{padding:20px 12px}
 .upload-zone .upload-text{font-size:13px}

 /* Commission preview stacking */
 .commission-preview{padding:10px}

 /* Version */
 .version{padding:12px}
}

@media(max-width:480px){
 /* Even tighter on small phones */
 .stat-grid{grid-template-columns:1fr}
 .stat-card .stat-value{font-size:22px}
 .stat-card{padding:12px 14px}
 .monthly-grid{grid-template-columns:repeat(4,1fr)}

 /* Tabs — compact with icons */
 .tab{padding:8px 10px;font-size:10px}

 /* Topbar minimal */
 .topbar .brand{font-size:14px}
 .topbar .agent-info{font-size:10px}
 .topbar-right{gap:8px}
 .topbar .logout-btn{padding:6px 10px;font-size:10px}

 /* Tier card */
 .tier-badge{font-size:26px}
 .tier-info .tier-value{font-size:14px}
 .tier-info .tier-label{font-size:11px}

 /* Projection cards */
 .proj-cards{flex-direction:column}

 /* Cash flow */
 .cf-card .cf-amount{font-size:20px}
}

/* ── Help Modal ── */
.help-modal{max-width:700px;width:90%;max-height:85vh;display:flex;flex-direction:column}
.help-search{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;margin-bottom:16px}
.help-search:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(83,74,183,.15)}
.help-topics{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.help-topic{padding:4px 12px;border-radius:16px;font-size:11px;font-weight:500;cursor:pointer;background:var(--bg);border:1px solid var(--border);color:var(--muted);transition:all .2s}
.help-topic:hover{border-color:var(--pri);color:var(--pri)}
.help-topic.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.help-content{flex:1;overflow-y:auto;padding-right:8px}
.help-section{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #f0f0f0}
.help-section h4{color:var(--pri);font-size:14px;margin-bottom:8px}
.help-section p,.help-section li{font-size:12px;line-height:1.6;color:var(--txt)}
.help-section ul{padding-left:18px;margin:6px 0}
.help-section .tip{background:var(--gtint);border-left:3px solid var(--grn);padding:8px 12px;border-radius:0 6px 6px 0;font-size:11px;margin:8px 0}

/* ── Onboarding Overlay ── */
.onboarding-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:none;justify-content:center;align-items:center;z-index:2000;padding:20px}
.onboarding-overlay.show{display:flex}
.onboarding-card{max-width:520px;width:100%;background:#fff;border-radius:16px;padding:36px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.onboarding-card h2{color:var(--pri);font-size:22px;margin-bottom:6px}
.onboarding-card .ob-subtitle{color:var(--muted);font-size:13px;margin-bottom:24px}
.ob-progress{display:flex;justify-content:center;gap:8px;margin-bottom:24px}
.ob-dot{width:10px;height:10px;border-radius:50%;background:#E0E0E0;transition:all .3s}
.ob-dot.active{background:var(--pri);transform:scale(1.2)}
.ob-dot.done{background:var(--grn)}
.ob-step{min-height:180px;text-align:left;padding:0 4px}
.ob-step h3{color:var(--pri);font-size:16px;margin-bottom:10px}
.ob-step p{font-size:13px;line-height:1.6;color:var(--txt);margin-bottom:10px}
.ob-step .ob-highlight{background:var(--ptint);border-radius:var(--radius);padding:12px 16px;margin:12px 0;font-size:12px}
.ob-step input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:inherit;margin-top:6px}
.ob-actions{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:16px;border-top:1px solid #f0f0f0}
.ob-actions .btn{min-width:100px}
.ob-skip{font-size:11px;color:var(--muted);cursor:pointer;text-decoration:underline}
.ob-skip:hover{color:var(--pri)}
@media(max-width:600px){
 .help-modal{max-width:100%;max-height:95vh;border-radius:12px 12px 0 0}
 .onboarding-card{padding:24px 16px}
 .ob-step{min-height:120px}
 .ob-step h3{font-size:14px}
 .ob-step p{font-size:12px}
 .onboarding-card h2{font-size:18px}
}
</style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="loginScreen" class="login-screen">
 <div class="login-card">
  <h1>Duet Books</h1>
  <div class="subtitle">Your Book of Business. One Place. Total Clarity.</div>

  <!-- Sign In Mode -->
  <div id="loginMode">
   <label>Your Name</label>
   <input id="login_name" type="text" placeholder="First Last" autocomplete="name">

// ── SHA-256 Hash (for PIN) ──
async function sha256(str){
 var buf = new TextEncoder().encode(str);
 var hash = await crypto.subtle.digest('SHA-256', buf);
 return Array.from(new Uint8Array(hash)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}

async function doRegister(){

 var branch = $1('#reg_branch').value.trim();

 var pin2 = $1('#reg_pin2').value.trim();
 var errEl = $1('#regError');

 if(!name || name.split(' ').length < 2){ errEl.textContent = 'Please enter your full name (first and last)'; errEl.style.display='block'; return; }
 if(!branch){ errEl.textContent = 'Please enter your branch'; errEl.style.display='block'; return; }
 if(!pin || pin.length < 4){ errEl.textContent = 'PIN must be at least 4 digits'; errEl.style.display='block'; return; }
 if(pin !== pin2){ errEl.textContent = 'PINs do not match'; errEl.style.display='block'; return; }

 var agentId = makeAgentId(name);
 // Check if agent already exists
 try {
  var existing = await fetch(FIREBASE_URL + '/' + agentId + '/profile.json').then(function(r){return r.json();});
  if(existing && existing.name){
   errEl.textContent = 'An account with that name already exists. Please sign in.';
   errEl.style.display = 'block';
   return;
  }
 } catch(e){}

 var pinHash = await sha256(pin);
 var profile = { name: name, branch: branch, pin: pinHash, created: new Date().toISOString() };

 await fetch(FIREBASE_URL + '/' + agentId + '/profile.json', {method:'PUT', body: JSON.stringify(profile)});

 currentAgent = { id: agentId, name: name, branch: branch };
 sessionStorage.setItem('db_agent', JSON.stringify(currentAgent));

 // Save to remembered agents list
 var remembered = JSON.parse(localStorage.getItem('db_remembered_agents') || '[]');
 if(!remembered.find(function(a){return a.id===agentId})){
  remembered.push({id:agentId, name:name});
  localStorage.setItem('db_remembered_agents', JSON.stringify(remembered));
 }

 settings = Object.assign({}, defaultSettings);
 saveSettings();
 cases = [];
 saveCases();
 payPeriods = [];
 savePayPeriods();

}

  var pinHash = await sha256(pin);
  if(pinHash !== profile.pin){
   errEl.textContent = 'Incorrect PIN. Please try again.';
   errEl.style.display = 'block';
   return;
  }

  currentAgent = { id: agentId, name: profile.name, branch: profile.branch };

  // Save to remembered
  var remembered = JSON.parse(localStorage.getItem('db_remembered_agents') || '[]');
  if(!remembered.find(function(a){return a.id===agentId})){
   remembered.push({id:agentId, name:profile.name});

 }

function calcCase(c){
 var p = findProd(c.product);
 var origGross, agentShare, partnerGets, fullComm;

 // If case has a Varicent-imported commission, use it directly — don't recalculate
 if(c.actualCommission !== undefined && c.actualCommission !== null){
  agentShare = c.actualCommission;
  fullComm = agentShare;
  origGross = agentShare;
  partnerGets = 0; // Varicent already handled the split
  return {origGross:origGross, agentShare:agentShare, partnerGets:partnerGets, fullComm:fullComm};
 }

 // Manual entry — calculate from amount × rate, then split
 if(p.flat){
  fullComm = c.amount;
  if(c.split === 'split'){
   agentShare = fullComm * (settings.yourShare/100);
   partnerGets = fullComm * (settings.partnerShare/100);
  } else {
   agentShare = fullComm;
   partnerGets = 0;
  }
  origGross = fullComm;
 } else {
  fullComm = c.amount * (c.rate / 100);
  origGross = fullComm;
  if(c.split === 'split'){
   agentShare = fullComm * (settings.yourShare/100);
   partnerGets = fullComm * (settings.partnerShare/100);
  } else {
   agentShare = fullComm;
   partnerGets = 0;
  }
 }
 return {origGross:origGross, agentShare:agentShare, partnerGets:partnerGets, fullComm:fullComm};
}

// ── Production Credit & Tier System (separate from commission) ──
// Production Credit: Annuities = 3% of paid premium, Life/IUL = 100%, CDs/Banking = 0%
// 3MMA = average Production Credit over PRIOR 3 months (excludes current month)
// 4 Tiers: T1 (0-3333), T2 (3334-4999), T3 (5000-6666), T4 (6667+)

function getProductCategory(c){
 var prodName = (c.product || '').toLowerCase();
 // Check for annuity products FIRST — 3% of premium
 // Must come before CD/other check because "Bonus Annuity" contains "bonus"
 if(prodName.indexOf('annuity') >= 0 || prodName.indexOf('gia') >= 0
  || prodName.indexOf('landmark') >= 0 || prodName.indexOf('legend') >= 0 || prodName.indexOf('elite') >= 0
  || prodName.indexOf('platinum') >= 0 || prodName.indexOf('safe return') >= 0
  || prodName.indexOf('premier') >= 0) return 'annuity';
 // Check for CDs, Banking, Bonus — these get $0 production credit
 if(prodName.indexOf('certificate') >= 0 || prodName.indexOf(' cd') >= 0 || prodName.indexOf('cd ') >= 0
  || prodName.indexOf('banking') >= 0 || prodName.indexOf('bonus') >= 0 || prodName.indexOf('other income') >= 0
  || prodName.indexOf('credit card') >= 0 || prodName.indexOf('membership') >= 0
  || prodName.indexOf('deposit') >= 0) return 'other';
 // Check for life/IUL products — 100% of premium
 var p = findProd(c.product);
 var cat = (p.cat || '').toLowerCase();
 var isRealMatch = (p.name === c.product); // only trust catalog category if exact match
 if(isRealMatch && (cat.indexOf('life') >= 0 || cat.indexOf('iul') >= 0)) return 'life';
 if(prodName.indexOf('term') >= 0 || prodName.indexOf('whole life') >= 0 || prodName.indexOf('giwl') >= 0
  || prodName.indexOf('iul') >= 0 || prodName.indexOf('accumulator') >= 0
  || prodName.indexOf('lifetime ul') >= 0 || prodName.indexOf('eclipse') >= 0
  || prodName.indexOf('paid up') >= 0 || prodName.indexOf('securian') >= 0
  || prodName.indexOf('ordinary life') >= 0 || prodName.indexOf('universal life') >= 0) return 'life';
 // Unknown product — default to no production credit (safe fallback)
 return 'other';
}

function calcProductionCredit(c){
 var cat = getProductCategory(c);
 var premium = c.amount || 0;
 if(cat === 'annuity') return premium * 0.03;
 if(cat === 'life') return premium;
 return 0;
}

function tierText(mma){ return mma >= 6667 ? 'T4' : mma >= 5000 ? 'T3' : mma >= 3334 ? 'T2' : 'T1'; }
function tierClass(mma){ return mma >= 6667 ? 't4' : mma >= 5000 ? 't3' : mma >= 3334 ? 't2' : 't1'; }

function calc3MMA(){
 // Prior 3 months, EXCLUDES current month per AAA Variable Incentive Plan
 // Uses submitted date (pay period month), NOT paidDate (import date)
 var now = new Date();
 var months = [];
 for(var i=1;i<=3;i++){
  var d = new Date(now.getFullYear(), now.getMonth()-i, 1);
  months.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));
 }
 var total = 0;
 cases.forEach(function(c){
  if(c.status !== 'paid') return;
  // Use submitted (pay period month) not paidDate (import date)
  var caseMonth = (c.submitted||c.paidDate||'').substring(0,7);
  if(months.indexOf(caseMonth) !== -1){
   total += calcProductionCredit(c);
  }
 });
 return total / 3;
}

function renderDashboard(){
 var year = new Date().getFullYear();
 var yearCases = cases.filter(function(c){ return (c.year||year) === year; });
 var totalCases = yearCases.length;
 var totalProduction = 0;
 var totalPaid = 0;
 var totalPending = 0;

 var nonCommProducts = ['Banking Incentive','Bonus','Other Income'];
 yearCases.forEach(function(c){
  if(nonCommProducts.indexOf(c.product) >= 0) return;
  var calc = calcCase(c);
  totalProduction += calc.agentShare;
  if(c.status === 'paid') totalPaid += calc.agentShare;
  else totalPending += calc.agentShare;
 });

 var mma = calc3MMA();
 var tier = tierText(mma);
 var tClass = tierClass(mma);
 // Next tier calculation based on Production Credit thresholds
 var nextTierAmt, nextTierName;
 if(mma >= 6667){ nextTierAmt = 0; nextTierName = ''; }
 else if(mma >= 5000){ nextTierAmt = 6667 - mma; nextTierName = 'T4'; }
 else if(mma >= 3334){ nextTierAmt = 5000 - mma; nextTierName = 'T3'; }
 else { nextTierAmt = 3334 - mma; nextTierName = 'T2'; }
 // Progress bar: 0 at T1, 100 at T4
 var tierPct = mma >= 6667 ? 100 : (mma / 6667 * 100);

 // Status counts
 var statusCounts = {};
 statusOrder.forEach(function(s){ statusCounts[s] = 0; });
 yearCases.forEach(function(c){ statusCounts[c.status] = (statusCounts[c.status]||0) + 1; });

 // Monthly production
 var monthlyProd = {};
 var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
 for(var m=0;m<12;m++) monthlyProd[m] = 0;
 yearCases.forEach(function(c){
  if(nonCommProducts.indexOf(c.product) >= 0) return;
  var d = c.submitted || c.created || '';
  if(d){
   var month = parseInt(d.substring(5,7)) - 1;
   monthlyProd[month] += calcCase(c).agentShare;
  }
 });
 var maxMonth = Math.max.apply(null, Object.values(monthlyProd).concat([1]));

 var h = '';

 // Latest month with production data
 var latestMonth = new Date().getMonth();
 for(var lm = new Date().getMonth(); lm >= 0; lm--){
  if(monthlyProd[lm] > 0){ latestMonth = lm; break; }
 }
 var curMonthProd = monthlyProd[latestMonth] || 0;

 // Stat cards
 h += '<div class="stat-grid">';
 h += '<div class="stat-card"><div class="stat-label">Total Cases ('+year+')</div><div class="stat-value">'+totalCases+'</div></div>';
 h += '<div class="stat-card"><div class="stat-label">Monthly Production ('+monthNames[latestMonth]+')</div><div class="stat-value">'+fmt(curMonthProd)+'</div></div>';
 h += '<div class="stat-card green"><div class="stat-label">YTD Paid</div><div class="stat-value" style="color:var(--grn)">'+fmt(totalPaid)+'</div></div>';
 h += '<div class="stat-card amber"><div class="stat-label">Pending</div><div class="stat-value" style="color:var(--amb)">'+fmt(totalPending)+'</div></div>';
 h += '</div>';

 // Tier card
 h += '<div class="tier-card">';
 h += '<div class="tier-badge '+tClass+'">'+tier+'</div>';
 h += '<div class="tier-info">';
 h += '<div class="tier-label">3-Month Moving Average (Production Credit)</div>';
 h += '<div class="tier-value">'+fmt(mma)+' / month</div>';
 if(nextTierAmt > 0){
  h += '<div style="font-size:11px;color:var(--muted);margin-top:4px">'+fmt(nextTierAmt)+' more in monthly production credit to reach '+nextTierName+'</div>';
 } else {
  h += '<div style="font-size:11px;color:var(--grn);margin-top:4px">You\'re at the highest tier!</div>';
 }
 h += '</div>';
 h += '<div class="tier-progress" style="flex:1">';
 h += '<div class="tier-labels" style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted)"><span>T1</span><span>T2</span><span>T3</span><span>T4</span></div>';
 h += '<div class="tier-bar"><div class="tier-bar-fill" style="width:'+Math.min(tierPct,100)+'%;background:var(--'+(tClass==='t4'?'grn':tClass==='t3'?'pri':tClass==='t2'?'amb':'red')+')"></div></div>';
 h += '</div>';
 h += '</div>';

 // Status breakdown
 h += '<div class="card">';
 h += '<h3>Book of Business Status Breakdown</h3>';
 h += '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px">';
 statusOrder.forEach(function(s){
  h += '<div style="text-align:center;min-width:80px">';
  h += '<div style="font-size:24px;font-weight:700">'+statusCounts[s]+'</div>';
  h += statusBadge(s);
  h += '</div>';
 });
 h += '</div></div>';

 // ── Tier Forecast ──
 // Calculate Production Credit per month for the year
 var monthlyPC = {};
 for(var mp=0;mp<12;mp++) monthlyPC[mp] = 0;
 yearCases.forEach(function(c){
  if(c.status !== 'paid') return;
  var d = c.submitted || c.paidDate || c.created || '';
  if(d){
   var mi = parseInt(d.substring(5,7)) - 1;
   monthlyPC[mi] += calcProductionCredit(c);
  }
 });

 // Current 3MMA months (prior 3, exclude current)
 var now3 = new Date();
 var mma_months = [];
 for(var mi3=1;mi3<=3;mi3++){
  var d3 = new Date(now3.getFullYear(), now3.getMonth()-mi3, 1);
  mma_months.push(d3.getMonth());
 }

 h += '<div class="card">';

 h += '<div style="overflow-x:auto;margin-top:12px">';
 h += '<table style="font-size:12px;min-width:500px"><thead><tr>';
 h += '<th style="text-align:left">Month</th><th style="text-align:right">Production Credit</th><th style="text-align:center">Role in 3MMA</th><th style="text-align:center">Projected Tier</th>';
 h += '</tr></thead><tbody>';

 // Show prior 3 months (current 3MMA)
 for(var r=2;r>=0;r--){
  var mIdx = mma_months[r];
  var pcVal = monthlyPC[mIdx] || 0;
  h += '<tr style="background:var(--gtint)">';
  h += '<td><strong>'+monthNames[mIdx]+'</strong></td>';

  h += '<td></td>';
  h += '</tr>';
 }
 // Current 3MMA summary row
 h += '<tr style="background:var(--ptint);font-weight:700">';
 h += '<td>Current 3MMA</td>';
 h += '<td style="text-align:right">'+fmt(mma)+'/mo</td>';
 h += '<td style="text-align:center">Average</td>';
 h += '<td style="text-align:center"><span class="badge '+(tClass==='t4'?'badge-grn':tClass==='t3'?'badge-pri':tClass==='t2'?'badge-amb':'badge-red')+'">'+tier+'</span></td>';
 h += '</tr>';

 h += '</tbody></table></div>';

 // ── Next Month Tier Projection ──
 // Next month's 3MMA will use the 2 most recent months + current month
 // e.g. in April: next month (May) uses Feb + Mar + Apr
 var projMonths = [];
 for(var pm=0;pm<=2;pm++){
  var pd = new Date(now3.getFullYear(), now3.getMonth()-pm, 1);
  projMonths.push(pd.getMonth());
 }
 var curMo = projMonths[0]; // current month (e.g. April)
 var lockedPC = 0; // the 2 prior months that are already done
 for(var lk=1;lk<=2;lk++) lockedPC += (monthlyPC[projMonths[lk]] || 0);
 var curMoPC = monthlyPC[curMo] || 0; // what's paid in current month so far

 // Calculate what's needed in current month to reach each tier
 var tierTargets = [
  {tier:'T2', threshold:3334, cls:'badge-amb'},
  {tier:'T3', threshold:5000, cls:'badge-pri'},
  {tier:'T4', threshold:6667, cls:'badge-grn'}
 ];

 h += '<div style="margin-top:16px">';
 h += '<h4 style="color:var(--pri);margin-bottom:8px">What You Need in '+monthNames[curMo]+' to Reach Next Tier</h4>';
 h += '<div style="font-size:11px;color:var(--muted);margin-bottom:10px">Next month\'s 3MMA will use: '+monthNames[projMonths[2]]+' + '+monthNames[projMonths[1]]+' + <strong>'+monthNames[curMo]+'</strong></div>';
 h += '<div class="proj-cards" style="display:flex;gap:12px;flex-wrap:wrap">';

 tierTargets.forEach(function(tt){
  var needed = (tt.threshold * 3) - lockedPC - curMoPC;

  h += '<div style="font-size:10px;color:var(--muted);margin-top:6px">Need '+fmt(tt.threshold)+'/mo avg</div>';
  if(already){
   h += '<div style="font-size:13px;font-weight:600;color:var(--grn);margin-top:6px">✓ On track</div>';
  } else {
   h += '<div style="font-size:16px;font-weight:700;margin-top:6px">'+fmt(needed)+'</div>';
   h += '<div style="font-size:10px;color:var(--muted)">more PC in '+monthNames[curMo]+'</div>';
  }
  h += '</div>';
 });

 h += '</div>';
 if(curMoPC > 0){
  h += '<div style="margin-top:8px;font-size:11px;color:var(--muted)">'+monthNames[curMo]+' so far: '+fmt(curMoPC)+' production credit</div>';
 }
 h += '</div>';

 h += '</div>';

 $1('#p0').innerHTML = h;
}

function getFilteredCases(){
 var year = new Date().getFullYear();
 var filtered = cases.filter(function(c){
  if(filterStatus && c.status !== filterStatus) return false;
  if(filterCarrier){
   var p = findProd(c.product);
   if(p.carrier !== filterCarrier) return false;
  }
  if(filterCat){
   var p = findProd(c.product);
   if(p.cat !== filterCat) return false;
  }
  if(searchQuery){
   var q = searchQuery.toLowerCase();
   if((c.client||'').toLowerCase().indexOf(q)===-1 && (c.phone||'').indexOf(q)===-1) return false;
  }
  return true;
 });

 // Sort
 filtered.sort(function(a,b){
  var va, vb;
  if(sortCol === 'client'){ va = (a.client||'').toLowerCase(); vb = (b.client||'').toLowerCase(); }
  else if(sortCol === 'carrier'){ va = findProd(a.product).carrier; vb = findProd(b.product).carrier; }
  else if(sortCol === 'product'){ va = a.product; vb = b.product; }
  else if(sortCol === 'amount'){ va = a.amount||0; vb = b.amount||0; }
  else if(sortCol === 'commission'){ va = calcCase(a).agentShare; vb = calcCase(b).agentShare; }
  else if(sortCol === 'status'){ va = statusIdx(a.status); vb = statusIdx(b.status); }
  else if(sortCol === 'submitted'){ va = a.submitted||''; vb = b.submitted||''; }
  else if(sortCol === 'estPay'){ va = a.estPay||''; vb = b.estPay||''; }
  else { va = a.submitted||''; vb = b.submitted||''; }
  if(va < vb) return sortAsc ? -1 : 1;
  if(va > vb) return sortAsc ? 1 : -1;
  return 0;
 });

 return filtered;
}

function setSort(col){
 if(sortCol === col) sortAsc = !sortAsc;
 else { sortCol = col; sortAsc = true; }

function ncCalcPreview(){

  return;
 }
 var p = findProd(prodName);

 var agentShare = fullComm;

  agentShare = fullComm * (settings.yourShare/100);

 }
 var curTier = getCurrentTier().toUpperCase();
 var pc = calcProductionCredit({product:prodName, amount:amount});
 el.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">'
  + '<div><div style="font-size:11px;color:var(--muted)">Current Tier</div><div style="font-size:16px;font-weight:700;color:var(--pri)">'+curTier+' <span style="font-size:11px;font-weight:400;color:var(--muted)">(Rate: '+rate+'%)</span></div></div>'
  + (partnerGets > 0 ? '<div><div style="font-size:11px;color:var(--muted)">Total Commission</div><div style="font-size:16px;font-weight:600">'+fmt(fullComm)+'</div></div>' : '')
  + '<div><div style="font-size:11px;color:var(--muted)">Your Commission ('+(partnerGets>0?settings.yourShare+'%':'100%')+')</div><div class="big">'+fmt(agentShare)+'</div></div>'
  + (partnerGets > 0 ? '<div style="text-align:right"><div style="font-size:11px;color:var(--muted)">Partner Gets ('+settings.partnerShare+'%)</div><div style="font-size:16px;font-weight:600">'+fmt(partnerGets)+'</div></div>' : '')
  + (pc > 0 ? '<div><div style="font-size:11px;color:var(--muted)">Production Credit</div><div style="font-size:14px;font-weight:500;color:var(--pri)">'+fmt(pc)+'</div></div>' : '')
  + '</div>';
}

function getPayPeriodYear(p){
 var mList = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
 if(p.month){
  var mi = mList.indexOf(p.month);
  if(mi >= 0 && mi > new Date().getMonth()) return new Date().getFullYear() - 1;
  return new Date().getFullYear();
 }
 if(p.created) return new Date(p.created).getFullYear();
 return new Date().getFullYear();
}

function updatePayPreview(){
 var varicent = pv('pp_varicent');
 var gross = pv('pp_gross');
 var pretax = pv('pp_pretax');
 var taxes = pv('pp_taxes');
 var posttax = pv('pp_posttax');
 var net = pv('pp_net');
 var mma = pv('pp_mma');

 var origGross = varicent > 0 ? varicent / (settings.yourShare/100) : 0;
 var partnerGot = origGross - varicent;
 var modelNet = gross - pretax - taxes - posttax;
 var diff = Math.abs(net - modelNet);
 var matchLabel = diff < 1 ? '<span class="strong">Perfect match</span>' : diff < 10 ? '<span class="possible">Close (diff: '+fmt(diff)+')</span>' : (net > 0 ? '<span style="color:var(--red);font-weight:600">Check entries (diff: '+fmt(diff)+')</span>' : '\u2014');

 var tierHtml = mma > 0 ? ('<span class="badge '+(mma>=6667?'badge-grn':mma>=5000?'badge-amb':'badge-red')+'">'+tierText(mma)+'</span> \u2014 3MMA: '+fmt(mma)) : '\u2014';

 var h = '<h4>Live Calculation Preview</h4>';
 h += '<table style="max-width:500px;font-size:13px">';
 h += '<tr><td>Your commission (entered)</td><td style="text-align:right"><b>'+fmt(varicent)+'</b></td></tr>';
 h += '<tr><td>Original gross (reverse: /'+settings.yourShare+'%)</td><td style="text-align:right">'+fmt(origGross)+'</td></tr>';
 h += '<tr><td>Partner received</td><td style="text-align:right">'+fmt(partnerGot)+'</td></tr>';
 h += '<tr><td colspan="2" style="border-top:2px solid var(--border);padding:2px"></td></tr>';
 h += '<tr><td>Model net pay</td><td style="text-align:right">'+fmt(modelNet)+'</td></tr>';
 h += '<tr><td>Actual payslip net</td><td style="text-align:right">'+fmt(net)+'</td></tr>';
 h += '<tr><td>Match</td><td style="text-align:right">'+matchLabel+'</td></tr>';
 h += '<tr><td>Tier</td><td style="text-align:right">'+tierHtml+'</td></tr>';
 h += '</table>';

 $1('#payPreview').innerHTML = h;

 // Pipeline match suggestions
 var sugEl = $1('#matchSuggestions');
 if(!sugEl) return;
 if(varicent > 0){
  var matches = [];
  cases.forEach(function(c){
   if(c.status === 'paid') return;
   var calc = calcCase(c);
   if(calc.agentShare <= 0) return;
   var pctDiff = Math.abs(calc.agentShare - varicent) / calc.agentShare;
   if(pctDiff <= 0.05){
    matches.push({c:c, calc:calc, pctDiff:pctDiff});
   }
  });
  if(matches.length){
   var mh = '<div class="match-box"><h4>Book of Business Match Suggestions</h4>';
   matches.forEach(function(m){
    var confidence = m.pctDiff < 0.005 ? '<span class="strong">Strong match</span>' : '<span class="possible">Possible match</span>';
    mh += '<div style="display:flex;align-items:center;gap:10px;margin:8px 0;padding:8px;background:#fff;border-radius:4px">';
    mh += '<div style="flex:1"><b>'+m.c.client+'</b> \u2014 '+m.c.product+'<br>Expected your share: '+fmt(m.calc.agentShare)+' (diff: '+(m.pctDiff*100).toFixed(2)+'%) '+confidence+'</div>';
    mh += '<button class="btn btn-sm btn-grn" onclick="confirmMatch('+m.c.id+')">Confirm Match</button>';
    mh += '</div>';
   });
   mh += '</div>';
   sugEl.innerHTML = mh;
  } else {
   sugEl.innerHTML = '';
  }
 } else {
  sugEl.innerHTML = '';
 }
}

function confirmMatch(caseId){
 var label = ($1('#pp_label')||{}).value || 'This period';
 cases.forEach(function(c){
  if(c.id === caseId){ c.status = 'paid'; c.paidIn = label; c.paidDate = toYMD(new Date()); }
 });
 saveCases();
 showToast('Matched! '+cases.find(function(c){return c.id===caseId}).client+' marked as Paid in '+label, 4000);
 updatePayPreview();
 renderDashboard();
}

 if(!label){ showToast('Please enter a period label (e.g. "Apr P1")', 3000); return; }
 payPeriods.push({
  id: nextPeId++,
  label: label,
  month: $1('#pp_month').value,
  mma: pv('pp_mma'),
  varicent: pv('pp_varicent'),

  gross: pv('pp_gross'),
  banking: pv('pp_banking'),
  bonuses: pv('pp_bonuses'),
  preTax: pv('pp_pretax'),

function showBucket(key){

 });

function renderCashFlow(){
 var year = cfYear;
 var now = new Date();
 var h = '<h2 style="margin-bottom:16px;color:var(--pri)">Cash Flow</h2>';

 // Year selector
 var years = {};
 cases.forEach(function(c){ if(c.year) years[c.year] = true; });
 years[new Date().getFullYear()] = true;
 var yearList = Object.keys(years).sort().reverse();
 h += '<div style="margin-bottom:16px;display:flex;gap:8px">';
 yearList.forEach(function(y){
  var active = parseInt(y) === year;
  h += '<button onclick="setCfYear('+y+')" style="padding:6px 16px;border-radius:6px;border:'+(active?'2px solid var(--pri)':'1px solid var(--border)')+';background:'+(active?'var(--ptint)':'var(--card)')+';color:'+(active?'var(--pri)':'var(--txt)')+';font-weight:'+(active?'700':'400')+';cursor:pointer">'+y+'</button>';
 });
 h += '</div>';

 // Calculate projections based on pipeline
 var paid = 0, pending30 = 0, pending60 = 0, pending90 = 0, pendingTotal = 0;
 var today = toYMD(now);
 var d30 = new Date(now); d30.setDate(d30.getDate()+30); var day30 = toYMD(d30);
 var d60 = new Date(now); d60.setDate(d60.getDate()+60); var day60 = toYMD(d60);
 var d90 = new Date(now); d90.setDate(d90.getDate()+90); var day90 = toYMD(d90);

 var nonCommProducts = ['Banking Incentive','Bonus','Other Income'];
 // Track cases by aging bucket for click-through
 var bucket0to30 = [], bucket30to60 = [], bucket60to90 = [], bucket90plus = [];
 cases.forEach(function(c){
  // Filter by selected year
  if((c.year || new Date().getFullYear()) !== year) return;
  // Skip non-commission line items
  if(nonCommProducts.indexOf(c.product) >= 0) return;
  var calc = calcCase(c);
  if(c.status === 'paid'){
   paid += calc.agentShare;
  } else {
   pendingTotal += calc.agentShare;
   // Age based on days since submitted
   var subDate = new Date(c.submitted || c.created || today);
   var daysAgo = Math.floor((now - subDate) / (1000*60*60*24));
   if(daysAgo <= 30){ pending30 += calc.agentShare; bucket0to30.push(c); }
   else if(daysAgo <= 60){ pending60 += calc.agentShare; bucket30to60.push(c); }
   else if(daysAgo <= 90){ pending90 += calc.agentShare; bucket60to90.push(c); }
   else { pending90 += calc.agentShare; bucket90plus.push(c); }
  }
 });
 // Store buckets globally for click-through
 window._cfBuckets = {b30: bucket0to30, b60: bucket30to60, b90: bucket60to90.concat(bucket90plus)};

 // YTD from pay periods (filtered by selected year)
 var monthList = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
 var ytdNet = 0, ytdGross = 0, ytdVaricent = 0, ytdBasePay = 0;
 payPeriods.forEach(function(p){
  // Determine pay period year from month or created date
  var pYear = year;
  if(p.month){
   var mi = monthList.indexOf(p.month);
   if(mi >= 0 && mi > new Date().getMonth()) pYear = new Date().getFullYear() - 1;
   else pYear = new Date().getFullYear();
  } else if(p.created){
   pYear = new Date(p.created).getFullYear();
  }
  if(pYear !== year) return;
  ytdNet += p.net || 0;
  ytdGross += p.gross || 0;
  ytdVaricent += p.varicent || 0;
  ytdBasePay += p.basePay || 0;
 });

 // Pipeline aging cards — based on days since submitted
 h += '<h3 style="margin-bottom:12px">Book of Business Aging (days since submitted)</h3>';
 h += '<div class="cf-grid">';
 h += '<div class="cf-card" style="cursor:pointer" onclick="showBucket(\'b30\')"><div class="cf-period">0–30 Days</div><div class="cf-amount" style="color:var(--grn);border-bottom:2px solid var(--pri);display:inline-block">'+fmt(pending30)+'</div><div class="cf-sub">'+bucket0to30.length+' case'+(bucket0to30.length!==1?'s':'')+' pending</div></div>';
 h += '<div class="cf-card" style="cursor:pointer" onclick="showBucket(\'b60\')"><div class="cf-period">30–60 Days</div><div class="cf-amount" style="color:var(--amb);border-bottom:2px solid var(--pri);display:inline-block">'+fmt(pending60)+'</div><div class="cf-sub">'+bucket30to60.length+' case'+(bucket30to60.length!==1?'s':'')+' pending</div></div>';
 var aging90 = bucket60to90.length + bucket90plus.length;
 h += '<div class="cf-card" style="cursor:pointer" onclick="showBucket(\'b90\')"><div class="cf-period">60+ Days</div><div class="cf-amount" style="color:'+(aging90>0?'var(--red)':'var(--muted)')+';border-bottom:2px solid var(--pri);display:inline-block">'+fmt(pending90)+'</div><div class="cf-sub">'+aging90+' case'+(aging90!==1?'s':'')+' pending</div></div>';
 h += '</div>';

 // Bucket detail area (populated when user clicks a card)
 h += '<div id="bucketDetail"></div>';

 // Gross Commission vs Actual Pay
 h += '<h3 style="margin-bottom:12px">Gross Commission vs. Actual Pay</h3>';
 h += '<div class="cf-vs">';
 h += '<div class="cf-vs-card" style="border-top-color:var(--pri)"><h4>Gross Commission</h4><div class="big" style="color:var(--pri)">'+fmt(paid)+'</div><div style="font-size:11px;color:var(--muted)">Paid commission before taxes ('+year+')</div></div>';
 h += '<div class="cf-vs-card" style="border-top-color:var(--grn)"><h4>Actual Pay (YTD)</h4><div class="big" style="color:var(--grn)">'+fmt(ytdNet)+'</div><div style="font-size:11px;color:var(--muted)">Commission + Banking + Bonus + Other Income</div></div>';
 h += '</div>';

 // Tax burden (filtered by selected year)
 var ytdTaxes = 0, ytdDeductions = 0;
 payPeriods.forEach(function(p){
  var pYear = year;
  if(p.month){
   var mi = monthList.indexOf(p.month);
   if(mi >= 0 && mi > new Date().getMonth()) pYear = new Date().getFullYear() - 1;
   else pYear = new Date().getFullYear();
  } else if(p.created){ pYear = new Date(p.created).getFullYear(); }
  if(pYear !== year) return;
  ytdTaxes += p.taxes || 0;
  ytdDeductions += (p.preTax||0) + (p.postTax||0);
 });
 var effectiveTaxRate = ytdGross > 0 ? (ytdTaxes / ytdGross * 100).toFixed(1) : '0.0';
 var effectiveDeductionRate = ytdGross > 0 ? (ytdDeductions / ytdGross * 100).toFixed(1) : '0.0';
 var takeHomeRate = ytdGross > 0 ? (ytdNet / ytdGross * 100).toFixed(1) : '0.0';

 h += '<div class="card">';
 h += '<h3>Tax & Deduction Summary</h3>';
 h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:12px;text-align:center">';
 h += '<div><div style="font-size:11px;color:var(--muted)">Effective Tax Rate</div><div style="font-size:22px;font-weight:700;color:var(--red)">'+effectiveTaxRate+'%</div><div style="font-size:11px;color:var(--muted)">'+fmt(ytdTaxes)+' in taxes</div></div>';
 h += '<div><div style="font-size:11px;color:var(--muted)">Deduction Rate</div><div style="font-size:22px;font-weight:700;color:var(--amb)">'+effectiveDeductionRate+'%</div><div style="font-size:11px;color:var(--muted)">'+fmt(ytdDeductions)+' in deductions</div></div>';
 h += '<div><div style="font-size:11px;color:var(--muted)">Take-Home Rate</div><div style="font-size:22px;font-weight:700;color:var(--grn)">'+takeHomeRate+'%</div><div style="font-size:11px;color:var(--muted)">'+fmt(ytdNet)+' net deposited</div></div>';
 h += '</div></div>';

 // What You Need to Sell
 var mma = calc3MMA();
 var tier = tierText(mma);
 h += '<div class="needs-card">';
 h += '<h3>What You Need to Sell</h3>';
 h += '<div style="font-size:12px;color:var(--muted);margin-bottom:12px">Based on your current '+tier+' tier (3MMA: '+fmt(mma)+')</div>';

 var targets = [
  {name:'Reach T3 ($5,000/mo)', mma:5000, show: mma < 5000},
  {name:'Reach T4 ($6,667/mo)', mma:6667, show: mma < 6667},
  {name:'$75K Annual Goal', annual:75000},
  {name:'$100K Annual Goal', annual:100000},
  {name:'$150K Annual Goal', annual:150000}
 ];

 targets.forEach(function(t){
  if(t.mma && !t.show) return;
  var needed;
  if(t.mma){
   needed = Math.max(0, (t.mma - mma) * 3);
   h += '<div class="needs-row"><span>'+t.name+'</span><span style="font-weight:600">'+fmt(needed)+' more in paid commission (next 3 months)</span></div>';
  } else {
   var remaining = Math.max(0, t.annual - paid);
   var monthsLeft = 12 - now.getMonth();
   var perMonth = monthsLeft > 0 ? remaining / monthsLeft : remaining;
   h += '<div class="needs-row"><span>'+t.name+'</span><span style="font-weight:600">'+fmt(remaining)+' remaining ('+fmt(perMonth)+'/mo)</span></div>';
  }
 });
 h += '</div>';

 // Monthly cash received
 h += '<div class="card">';
 h += '<h3>Monthly Cash Received ('+year+')</h3>';
 var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
 var monthlyNet = {};
 for(var m=0;m<12;m++) monthlyNet[m] = 0;
 payPeriods.forEach(function(p){
  var mi = monthNames.indexOf(p.month);
  if(mi >= 0) monthlyNet[mi] += p.net || 0;
 });
 var maxMN = Math.max.apply(null, Object.values(monthlyNet).concat([1]));

 h += '<div class="monthly-grid">';
 for(var m=0;m<12;m++){
  var val = monthlyNet[m];
  var bg = val > 0 ? 'var(--gtint)' : '#f5f5f5';

  h += '<div class="month-cell" style="background:'+bg+'">';

  h += '<div class="month-value" style="color:'+color+'">'+fmt(val).replace('$','').split('.')[0]+'</div>';
  h += '</div>';
 }
 h += '</div></div>';

 $1('#p3').innerHTML = h;
}

async function changePin(){
 var oldPin = ($1('#s_oldpin').value||'').trim();
 var newPin = ($1('#s_newpin').value||'').trim();
 var newPin2 = ($1('#s_newpin2').value||'').trim();

 if(!oldPin){ showToast('Enter current PIN', 2000); return; }
 if(!newPin || newPin.length < 4){ showToast('New PIN must be at least 4 digits', 2000); return; }
 if(newPin !== newPin2){ showToast('New PINs do not match', 2000); return; }

 var profile = await fetch(FIREBASE_URL + '/' + currentAgent.id + '/profile.json').then(function(r){return r.json();});
 var oldHash = await sha256(oldPin);
 if(oldHash !== profile.pin){ showToast('Current PIN is incorrect', 3000); return; }

 var newHash = await sha256(newPin);
 profile.pin = newHash;
 await fetch(FIREBASE_URL + '/' + currentAgent.id + '/profile.json', {method:'PUT', body: JSON.stringify(profile)});
 showToast('PIN changed successfully', 3000);
 $1('#s_oldpin').value = '';
 $1('#s_newpin').value = '';
 $1('#s_newpin2').value = '';
}

function downloadBackup(){

function restoreBackup(input){
 var file = input.files[0];
 if(!file) return;
 var reader = new FileReader();
 reader.onload = function(e){
  try {
   var data = JSON.parse(e.target.result);
   if(!data.cases){ showToast('Invalid backup file', 3000); return; }
   if(!confirm('This will replace your current data with '+data.cases.length+' cases from the backup. Continue?')) return;
   cases = data.cases;
   payPeriods = data.payPeriods || [];
   if(data.settings) settings = Object.assign({}, defaultSettings, data.settings);
   nextCaseId = 1;
   cases.forEach(function(c){ if(c.id >= nextCaseId) nextCaseId = c.id + 1; });
   nextPeId = 1;
   payPeriods.forEach(function(p){ if(p.id >= nextPeId) nextPeId = p.id + 1; });
   saveCases();
   savePayPeriods();
   saveSettings();
   showToast('Restored '+cases.length+' cases and '+payPeriods.length+' pay periods from backup', 3000);
   renderAll();
  } catch(err){
   showToast('Error reading backup: ' + err.message, 4000);
  }
 };
 reader.readAsText(file);
 input.value = '';
}

function processFiles(fileList){
 var previewEl = $1('#upload_previews');
 var maxFiles = 4;
 if(uploadedFiles.length + fileList.length > maxFiles){
  showToast('Maximum '+maxFiles+' files at a time. Remove some first.', 3000);
  return;
 }
 for(var i=0;i<fileList.length;i++){
  (function(file){
   var reader = new FileReader();
   reader.onload = function(e){
    var base64 = e.target.result.split(',')[1];
    var mediaType = file.type || 'image/png';
    if(file.name.toLowerCase().endsWith('.pdf')) mediaType = 'application/pdf';
    uploadedFiles.push({name:file.name, base64:base64, mediaType:mediaType});
    // Show preview
    if(previewEl){
     var img = mediaType.startsWith('image/') ? '<img src="'+e.target.result+'" class="upload-preview">' : '<div style="padding:8px;background:#fff;border-radius:6px;font-size:11px">\uD83D\uDCC4 '+file.name+'</div>';

async function processUploads(){

 var statusEl = $1('#upload_status');

 var allResults = [];

 // Process each file separately so each gets its own pay period
 for(var fi=0; fi<uploadedFiles.length; fi++){

rate" = the commission rate column (e.g. 50.00 for 50%, 2.85 for 2.85%, 0.05 for 0.05%)\n- "commission" = the actual commission amount paid (New Incentive Commission or equivalent)\n- "is_split" = true if LPSplitCommInd column says SPLIT, false otherwise\n\nExtract EVERY line item from EVERY section exactly as shown. Do not skip banking or CD items. Do not calculate or modify any numbers.\n\nReturn ONLY valid JSON, no markdown or explanation.'});

  try {
   var resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
     'Content-Type': 'application/json',
     'x-api-key': apiKey,
     'anthropic-version': '2023-06-01',
     'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
     model: 'claude-sonnet-4-20250514',
     max_tokens: 2048,
     messages: [{role:'user', content:content}]
    })
   });

   if(!resp.ok){
    var errText = await resp.text();
    errors.push(f.name + ': API error ' + resp.status);
    continue;
   }

   var data = await resp.json();
   var text = data.content[0].text.trim();
   if(text.startsWith('```')) text = text.replace(/```json?\n?/,'').replace(/```$/,'').trim();
   var parsed = JSON.parse(text);

 // Now process all results — group Varicent and Workday separately
 var varicents = allResults.filter(function(r){return r.doc_type === 'varicent'});
 var workdays = allResults.filter(function(r){return r.doc_type === 'workday'});

  var yr = (mi > curMonth) ? new Date().getFullYear() - 1 : new Date().getFullYear();

 var totalNewCases = 0, totalUpdatedCases = 0, periodsCreated = 0, duplicatesSkipped = 0;

 // Auto-save each pay period
 // Try to pair Varicent + Workday by period label/month, otherwise create separate entries
 var usedWorkdays = {};

 varicents.forEach(function(v){
  // DUPLICATE CHECK — skip if matching pay period already exists
  // Check by: (1) same period label, OR (2) same month + same varicent commission amount
  var periodLabel = (v.period_label || '').toLowerCase().trim();
  var vMonth = (v.month || '').toLowerCase().trim();

  // Check if this Varicent was already fully imported (has commission data)
  var dupPeriod = payPeriods.find(function(p){
   if(periodLabel && p.label && p.label.toLowerCase().trim() === periodLabel && (p.varicent||0) > 0) return true;
   if(vMonth && p.month && p.month.toLowerCase().trim() === vMonth && Math.round((p.varicent||0)*100) === vComm && vComm > 0) return true;
   return false;

   duplicatesSkipped++;
   return; // skip this varicent — already imported

   });

  if(!existingWOnly && vMonth){
   var vPnumDup = (v.period_label||'').match(/P(\d)/i);

      matchedW = w; usedWorkdays[wi] = true;
     }
    }
   });
  }
  // Last fallback: match by month (first available)
  if(!matchedW){
   workdays.forEach(function(w, wi){
    if(!matchedW && !usedWorkdays[wi] && w.month && v.month && w.month.toLowerCase() === v.month.toLowerCase()){
     matchedW = w; usedWorkdays[wi] = true;
    }
   });
  }

  // Create new pay period only if we didn't update an existing Workday-only one
  if(!skipNewPeriod){
   var pe = {
    id: nextPeId++,

   v.cases.forEach(function(pc){
    if(!pc.client) return;

    });

    var pcComm = Math.round((pc.commission || 0) * 100);

     return c.client.toLowerCase().trim() === pc.client.toLowerCase().trim()
      && c.product === prodLabel && c.paidIn === (v.period_label || '')
      && Math.round((c.actualCommission || 0) * 100) === pcComm;
    }).length;

    var currentIndex = v.cases.indexOf(pc);

     var prev = v.cases[ci];

     if((prev.client||'').toLowerCase().trim() === pc.client.toLowerCase().trim()
      && prevProd === prodLabel
      && Math.round((prev.commission || 0) * 100) === pcComm) batchCount++;
    }
    var alreadyImported = alreadyCount > batchCount;
    if(alreadyImported){
     // Already imported this exact case — skip
    } else if(existing){

    } else {
     // Use actual Varicent values — store commission directly

   });

var helpFilter = '';
var helpActiveTopic = '';

function openHelp(){
 $1('#helpModal').classList.add('show');
 renderHelp();
}
function closeHelp(){
 $1('#helpModal').classList.remove('show');
}
function renderHelp(){
 var q = helpFilter.toLowerCase();
 var filtered = HELP_TOPICS;
 if(q){
  filtered = HELP_TOPICS.filter(function(t){
   return t.title.toLowerCase().indexOf(q) >= 0 || t.content.toLowerCase().indexOf(q) >= 0;
  });
 }
 if(helpActiveTopic && !q){
  filtered = HELP_TOPICS.filter(function(t){ return t.id === helpActiveTopic; });
 }

 var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
 h += '<h2 style="font-size:20px;color:var(--pri);margin:0">Help</h2>';
 h += '<span style="font-size:20px;cursor:pointer;color:var(--muted);padding:4px 8px" onclick="closeHelp()">&times;</span>';
 h += '</div>';
 h += '<input class="help-search" type="text" placeholder="Search help topics..." value="'+helpFilter+'" oninput="helpFilter=this.value;helpActiveTopic=\'\';renderHelp()">';

 // Topic pills
 h += '<div class="help-topics">';
 h += '<div class="help-topic '+((!helpActiveTopic && !q)?'active':'')+'" onclick="helpActiveTopic=\'\';helpFilter=\'\';renderHelp()">All Topics</div>';
 HELP_TOPICS.forEach(function(t){
  var isActive = helpActiveTopic === t.id;
  var matchesFilter = !q || t.title.toLowerCase().indexOf(q) >= 0 || t.content.toLowerCase().indexOf(q) >= 0;
  if(!q || matchesFilter){
   h += '<div class="help-topic '+(isActive?'active':'')+'" onclick="helpActiveTopic=\''+t.id+'\';helpFilter=\'\';renderHelp()">'+t.title+'</div>';
  }
 });
 h += '</div>';

 // Content
 h += '<div class="help-content">';
 if(filtered.length === 0){
  h += '<p style="color:var(--muted);text-align:center;padding:40px 0">No topics found for "'+helpFilter+'"</p>';
 }
 filtered.forEach(function(t){
  h += '<div class="help-section"><h4>'+t.title+'</h4>'+t.content+'</div>';
 });
 h += '</div>';

 $1('#helpModalContent').innerHTML = h;
}

// Close help on overlay click
document.addEventListener('click', function(e){
 if(e.target.id === 'helpModal') closeHelp();
});

function showOnboarding(){
 if(localStorage.getItem('db_onboarding_done_' + currentAgent.id)) return;
 onboardingStep = 0;
 $1('#onboardingOverlay').classList.add('show');
 renderOnboardingStep();
}

function renderOnboardingStep(){
 var step = ONBOARDING_STEPS[onboardingStep];
 var total = ONBOARDING_STEPS.length;
 var isFirst = onboardingStep === 0;
 var isLast = onboardingStep === total - 1;

 var h = '';
 // Progress dots
 h += '<div class="ob-progress">';
 for(var d=0;d<total;d++){
  var cls = d < onboardingStep ? 'done' : d === onboardingStep ? 'active' : '';
  h += '<div class="ob-dot '+cls+'"></div>';
 }
 h += '</div>';

 h += '<h2>'+step.title+'</h2>';
 h += '<div class="ob-subtitle">Step '+(onboardingStep+1)+' of '+total+'</div>';

 h += '<div class="ob-step">'+step.content()+'</div>';

 h += '<div class="ob-actions">';
 if(isFirst){
  h += '<span class="ob-skip" onclick="completeOnboarding()">Skip setup</span>';
 } else {
  h += '<button class="btn btn-outline" onclick="prevOnboardingStep()">Back</button>';
 }
 if(isLast){
  h += '<button class="btn btn-grn" onclick="completeOnboarding()">Get Started</button>';
 } else {
  h += '<button class="btn btn-pri" onclick="nextOnboardingStep()">Next</button>';
 }
 h += '</div>';

 $1('#onboardingCard').innerHTML = h;
}

function nextOnboardingStep(){
 if(onboardingStep < ONBOARDING_STEPS.length - 1){
  onboardingStep++;
  renderOnboardingStep();
 }
}
function prevOnboardingStep(){
 if(onboardingStep > 0){
  onboardingStep--;
  renderOnboardingStep();
 }
}
function completeOnboarding(){
 localStorage.setItem('db_onboarding_done_' + currentAgent.id, 'true');
 $1('#onboardingOverlay').classList.remove('show');
}
function saveObApiKey(){
 var key = ($1('#ob_apikey')||{}).value || '';
 if(key.trim()){
  localStorage.setItem('db_anthropic_key', key.trim());
  showToast('API key saved!', 2000);
  renderOnboardingStep();
 }
}
